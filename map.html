<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CCTV Map - Udon Thani</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
        <style>
            * { box-sizing: border-box; }
            body { padding: 0; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
            html, body, #map { height: 100%; width: 100%; }
            .nav-link {
                position: fixed; top: 12px; right: 12px; z-index: 1000;
                background: #fff; color: #333; text-decoration: none;
                padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
                box-shadow: 0 1px 4px rgba(0,0,0,.15);
                transition: background .15s;
            }
            .nav-link:hover { background: #f5f5f5; }

            /* Dark themed Leaflet popup */
            .dark-popup .leaflet-popup-content-wrapper {
                background: #1a1a1a;
                color: #fff;
                border-radius: 10px;
                box-shadow: 0 8px 30px rgba(0,0,0,.5);
                padding: 0;
            }
            .dark-popup .leaflet-popup-content {
                margin: 0;
                min-width: 340px;
            }
            .dark-popup .leaflet-popup-tip {
                background: #1a1a1a;
                box-shadow: 0 4px 10px rgba(0,0,0,.3);
            }
            .dark-popup .leaflet-popup-close-button {
                color: #888;
                font-size: 20px;
                top: 8px;
                right: 10px;
                width: 22px;
                height: 22px;
                transition: color .15s;
            }
            .dark-popup .leaflet-popup-close-button:hover {
                color: #fff;
            }

            /* Popup content styling */
            .cam-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 12px 14px;
                background: #222;
                border-radius: 10px 10px 0 0;
            }
            .cam-header .status-dot {
                display: inline-block;
                width: 8px; height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .cam-header .status-dot.online { background: #4caf50; }
            .cam-header .status-dot.offline { background: #e53935; }
            .cam-header .cam-name {
                font-size: 13px;
                font-weight: 500;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .cam-video-wrap {
                position: relative;
                width: 100%;
                padding-top: 56.25%; /* 16:9 */
                background: #000;
                border-radius: 0 0 10px 10px;
                overflow: hidden;
            }
            .cam-video-wrap video {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: contain;
            }
            .cam-video-wrap .cam-msg {
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                color: #666;
                font-size: 13px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <a href="/admin.html" class="nav-link">Admin</a>
        <div id="map"></div>

        <script>
            var map = L.map('map').setView([17.4046, 102.7943], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            var previewHls = null;
            var allMarkers = [];

            // Red icon for offline cameras
            var redIcon = L.icon({
                iconUrl: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 41"><path d="M12.5 0C5.6 0 0 5.6 0 12.5 0 21.9 12.5 41 12.5 41S25 21.9 25 12.5C25 5.6 19.4 0 12.5 0z" fill="#e53935"/><circle cx="12.5" cy="12.5" r="5.5" fill="#fff"/></svg>'),
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                shadowSize: [41, 41],
                shadowAnchor: [12, 41]
            });

            // Default blue icon
            var blueIcon = L.icon({
                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                shadowSize: [41, 41],
                shadowAnchor: [12, 41]
            });

            // --- Check visible markers on map ---
            var checkTimer = null;
            var checking = false;

            function checkVisibleMarkers() {
                if (checking || allMarkers.length === 0) return;
                var bounds = map.getBounds();
                var visibleIds = [];
                var markerMap = {};
                allMarkers.forEach(function(m) {
                    if (bounds.contains(m.getLatLng()) && m._camId) {
                        visibleIds.push(m._camId);
                        markerMap[m._camId] = m;
                    }
                });
                if (visibleIds.length === 0) return;

                checking = true;
                fetch('/api/cameras/check-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: visibleIds })
                })
                .then(function(r) { return r.json(); })
                .then(function(results) {
                    results.forEach(function(r) {
                        var marker = markerMap[r.id];
                        if (marker) {
                            marker._status = r.status;
                            marker.setIcon(r.status === 'offline' ? redIcon : blueIcon);
                        }
                    });
                })
                .catch(function() {})
                .finally(function() { checking = false; });
            }

            function debouncedCheck() {
                if (checkTimer) clearTimeout(checkTimer);
                checkTimer = setTimeout(checkVisibleMarkers, 600);
            }

            map.on('moveend', debouncedCheck);

            // --- Build popup HTML ---
            function buildPopupHtml(cam) {
                var statusClass = cam.status === 'online' ? 'online' : 'offline';
                return '<div class="cam-header">' +
                           '<span class="status-dot ' + statusClass + '"></span>' +
                           '<span class="cam-name">' + cam.name + '</span>' +
                       '</div>' +
                       '<div class="cam-video-wrap">' +
                           '<video id="cam-video" autoplay muted playsinline></video>' +
                           '<div class="cam-msg" id="cam-msg"></div>' +
                       '</div>';
            }

            // --- Load cameras ---
            fetch('/api/cameras')
                .then(function(r) { return r.json(); })
                .then(function(cameras) {
                    var markers = L.markerClusterGroup({ maxClusterRadius: 40 });
                    cameras.forEach(function(cam) {
                        if (!cam.lat || !cam.lon) return;

                        var opts = cam.status === 'offline' ? { icon: redIcon } : {};
                        var m = L.marker([cam.lat, cam.lon], opts);

                        m.bindPopup(buildPopupHtml(cam), {
                            maxWidth: 400,
                            minWidth: 340,
                            className: 'dark-popup'
                        });

                        m._streamUrl = cam.stream_url;
                        m._camId = cam.id;
                        m._camName = cam.name;
                        m._status = cam.status;
                        markers.addLayer(m);
                        allMarkers.push(m);
                    });
                    map.addLayer(markers);

                    // Check visible markers right after loading
                    checkVisibleMarkers();
                });

            // --- Cleanup HLS helper ---
            function cleanupHls() {
                if (previewHls) {
                    previewHls.destroy();
                    previewHls = null;
                }
            }

            // --- Popup open: cleanup old stream first, then play new ---
            map.on('popupopen', function(e) {
                // Always cleanup previous HLS first (fixes switching markers without closing)
                cleanupHls();

                var marker = e.popup._source;
                var url = marker._streamUrl;

                // Update popup status from stored status
                if (marker._status) {
                    var dotEl = e.popup.getElement().querySelector('.status-dot');
                    if (dotEl) {
                        dotEl.className = 'status-dot ' + marker._status;
                    }
                }

                var video = document.getElementById('cam-video');
                var msg = document.getElementById('cam-msg');
                if (!video) return;

                msg.textContent = '';
                video.pause();
                video.removeAttribute('src');
                video.load();
                video.style.display = 'block';

                if (!url) {
                    video.style.display = 'none';
                    msg.textContent = 'ไม่มี Stream URL';
                    return;
                }

                if (url.includes('.m3u8') && Hls.isSupported()) {
                    previewHls = new Hls({ enableWorker: true, lowLatencyMode: true });
                    previewHls.loadSource(url);
                    previewHls.attachMedia(video);
                    previewHls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(function(){});
                    });
                    previewHls.on(Hls.Events.ERROR, function(ev, data) {
                        if (data.fatal) {
                            video.style.display = 'none';
                            msg.textContent = 'ไม่สามารถโหลดสตรีมได้';
                        }
                    });
                } else if (url.includes('.m3u8') && video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play().catch(function(){});
                } else {
                    video.src = url;
                    video.play().catch(function() {
                        video.style.display = 'none';
                        msg.textContent = 'ไม่สามารถโหลดสตรีมได้';
                    });
                }
            });

            // --- Popup close: cleanup HLS ---
            map.on('popupclose', function() {
                cleanupHls();
            });
        </script>
    </body>
</html>
