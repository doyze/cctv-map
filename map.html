<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CCTV Map - Udon Thani</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
        <style>
            * { box-sizing: border-box; }
            body { padding: 0; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
            html, body, #map { height: 100%; width: 100%; }
            .cam-popup { min-width: 340px; }
            .cam-popup .cam-name { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
            .cam-popup .cam-status { font-size: 12px; margin-bottom: 6px; }
            .cam-popup .cam-status.online { color: #2e7d32; }
            .cam-popup .cam-status.offline { color: #c62828; }
            .nav-link {
                position: fixed; top: 12px; right: 12px; z-index: 1000;
                background: #fff; color: #333; text-decoration: none;
                padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
                box-shadow: 0 1px 4px rgba(0,0,0,.15);
                transition: background .15s;
            }
            .nav-link:hover { background: #f5f5f5; }
        </style>
    </head>
    <body>
        <a href="/admin.html" class="nav-link">Admin</a>
        <div id="map"></div>
        <script>
            var map = L.map('map').setView([17.4046, 102.7943], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            var hls = null;
            var allMarkers = [];

            // Red icon for offline cameras
            var redIcon = L.icon({
                iconUrl: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 41"><path d="M12.5 0C5.6 0 0 5.6 0 12.5 0 21.9 12.5 41 12.5 41S25 21.9 25 12.5C25 5.6 19.4 0 12.5 0z" fill="#e53935"/><circle cx="12.5" cy="12.5" r="5.5" fill="#fff"/></svg>'),
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                shadowSize: [41, 41],
                shadowAnchor: [12, 41]
            });

            // Default blue icon (for restoring from red)
            var blueIcon = L.icon({
                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                shadowSize: [41, 41],
                shadowAnchor: [12, 41]
            });

            // --- Check visible markers on map ---
            var checkTimer = null;
            var checking = false;

            function checkVisibleMarkers() {
                if (checking || allMarkers.length === 0) return;
                var bounds = map.getBounds();
                var visibleIds = [];
                var markerMap = {};
                allMarkers.forEach(function(m) {
                    if (bounds.contains(m.getLatLng()) && m._camId) {
                        visibleIds.push(m._camId);
                        markerMap[m._camId] = m;
                    }
                });
                if (visibleIds.length === 0) return;

                checking = true;
                fetch('/api/cameras/check-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: visibleIds })
                })
                .then(function(r) { return r.json(); })
                .then(function(results) {
                    results.forEach(function(r) {
                        var marker = markerMap[r.id];
                        if (marker) {
                            marker._status = r.status;
                            marker.setIcon(r.status === 'offline' ? redIcon : blueIcon);
                        }
                    });
                })
                .catch(function() {})
                .finally(function() { checking = false; });
            }

            function debouncedCheck() {
                if (checkTimer) clearTimeout(checkTimer);
                checkTimer = setTimeout(checkVisibleMarkers, 600);
            }

            map.on('moveend', debouncedCheck);

            // --- Load cameras ---
            fetch('/api/cameras')
                .then(function(r) { return r.json(); })
                .then(function(cameras) {
                    var markers = L.markerClusterGroup({ maxClusterRadius: 40 });
                    cameras.forEach(function(cam) {
                        if (!cam.lat || !cam.lon) return;

                        var opts = cam.status === 'offline' ? { icon: redIcon } : {};
                        var m = L.marker([cam.lat, cam.lon], opts);

                        var statusClass = cam.status === 'online' ? 'online' : 'offline';
                        var statusText = cam.status === 'online' ? 'Online' : 'Offline';
                        var popupHtml =
                            '<div class="cam-popup">' +
                                '<div class="cam-name">' + cam.name + '</div>' +
                                '<div class="cam-status ' + statusClass + '">' + statusText + '</div>' +
                                '<video id="video" width="320" height="240" autoplay muted></video>' +
                            '</div>';

                        m.bindPopup(popupHtml, { maxWidth: 360 });
                        m._streamUrl = cam.stream_url;
                        m._camId = cam.id;
                        m._status = cam.status;
                        markers.addLayer(m);
                        allMarkers.push(m);
                    });
                    map.addLayer(markers);

                    // Check visible markers right after loading
                    checkVisibleMarkers();
                });

            // --- Popup: play video + show updated status ---
            map.on('popupopen', function(e) {
                var marker = e.popup._source;
                var url = marker._streamUrl;

                // Update popup status text from stored status
                if (marker._status) {
                    var statusEl = marker.getPopup().getElement().querySelector('.cam-status');
                    if (statusEl) {
                        statusEl.className = 'cam-status ' + marker._status;
                        statusEl.textContent = marker._status === 'online' ? 'Online' : 'Offline';
                    }
                }

                if (url) {
                    var video = document.getElementById('video');
                    if (Hls.isSupported()) {
                        hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                    }
                }
            });

            map.on('popupclose', function(e) {
                if (hls) {
                    hls.destroy();
                    hls = null;
                }
                var video = document.getElementById('video');
                if (video) video.remove();
            });
        </script>
    </body>
</html>
