<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CCTV Map - Udon Thani</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
        <style>
            * { box-sizing: border-box; }
            body { padding: 0; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
            html, body, #map { height: 100%; width: 100%; }
            .nav-link {
                position: fixed; top: 12px; right: 12px; z-index: 1000;
                background: #fff; color: #333; text-decoration: none;
                padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
                box-shadow: 0 1px 4px rgba(0,0,0,.15);
                transition: background .15s;
            }
            .nav-link:hover { background: #f5f5f5; }

            /* Video Preview Modal (same as admin) */
            .preview-overlay {
                display: none;
                position: fixed; inset: 0;
                background: rgba(0,0,0,.6);
                z-index: 2000;
                justify-content: center;
                align-items: center;
            }
            .preview-overlay.active { display: flex; }
            .preview-box {
                background: #111;
                border-radius: 12px;
                width: 90%;
                max-width: 640px;
                overflow: hidden;
                box-shadow: 0 20px 60px rgba(0,0,0,.5);
            }
            .preview-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 18px;
                background: #1a1a1a;
            }
            .preview-header h3 {
                color: #fff;
                font-size: 14px;
                font-weight: 500;
                margin: 0;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .preview-header .preview-status {
                display: inline-block;
                width: 8px; height: 8px;
                border-radius: 50%;
            }
            .preview-header .preview-status.online { background: #4caf50; }
            .preview-header .preview-status.offline { background: #e53935; }
            .preview-close {
                background: none;
                border: none;
                color: #888;
                font-size: 22px;
                cursor: pointer;
                padding: 0 4px;
                line-height: 1;
                transition: color .15s;
            }
            .preview-close:hover { color: #fff; }
            .preview-video {
                position: relative;
                width: 100%;
                padding-top: 56.25%; /* 16:9 */
                background: #000;
            }
            .preview-video video {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: contain;
            }
            .preview-video .preview-msg {
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                color: #888;
                font-size: 14px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <a href="/admin.html" class="nav-link">Admin</a>
        <div id="map"></div>

        <!-- Video Preview Modal -->
        <div class="preview-overlay" id="preview-modal">
            <div class="preview-box">
                <div class="preview-header">
                    <h3>
                        <span class="preview-status" id="preview-status-dot"></span>
                        <span id="preview-name"></span>
                    </h3>
                    <button class="preview-close" onclick="closePreview()">&times;</button>
                </div>
                <div class="preview-video">
                    <video id="preview-video" autoplay muted playsinline></video>
                    <div class="preview-msg" id="preview-msg"></div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
        <script>
            var map = L.map('map').setView([17.4046, 102.7943], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            var previewHls = null;
            var allMarkers = [];

            // Red icon for offline cameras
            var redIcon = L.icon({
                iconUrl: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 41"><path d="M12.5 0C5.6 0 0 5.6 0 12.5 0 21.9 12.5 41 12.5 41S25 21.9 25 12.5C25 5.6 19.4 0 12.5 0z" fill="#e53935"/><circle cx="12.5" cy="12.5" r="5.5" fill="#fff"/></svg>'),
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                shadowSize: [41, 41],
                shadowAnchor: [12, 41]
            });

            // Default blue icon (for restoring from red)
            var blueIcon = L.icon({
                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                shadowSize: [41, 41],
                shadowAnchor: [12, 41]
            });

            // --- Check visible markers on map ---
            var checkTimer = null;
            var checking = false;

            function checkVisibleMarkers() {
                if (checking || allMarkers.length === 0) return;
                var bounds = map.getBounds();
                var visibleIds = [];
                var markerMap = {};
                allMarkers.forEach(function(m) {
                    if (bounds.contains(m.getLatLng()) && m._camId) {
                        visibleIds.push(m._camId);
                        markerMap[m._camId] = m;
                    }
                });
                if (visibleIds.length === 0) return;

                checking = true;
                fetch('/api/cameras/check-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: visibleIds })
                })
                .then(function(r) { return r.json(); })
                .then(function(results) {
                    results.forEach(function(r) {
                        var marker = markerMap[r.id];
                        if (marker) {
                            marker._status = r.status;
                            marker.setIcon(r.status === 'offline' ? redIcon : blueIcon);
                        }
                    });
                })
                .catch(function() {})
                .finally(function() { checking = false; });
            }

            function debouncedCheck() {
                if (checkTimer) clearTimeout(checkTimer);
                checkTimer = setTimeout(checkVisibleMarkers, 600);
            }

            map.on('moveend', debouncedCheck);

            // --- Load cameras ---
            fetch('/api/cameras')
                .then(function(r) { return r.json(); })
                .then(function(cameras) {
                    var markers = L.markerClusterGroup({ maxClusterRadius: 40 });
                    cameras.forEach(function(cam) {
                        if (!cam.lat || !cam.lon) return;

                        var opts = cam.status === 'offline' ? { icon: redIcon } : {};
                        var m = L.marker([cam.lat, cam.lon], opts);
                        m._streamUrl = cam.stream_url;
                        m._camId = cam.id;
                        m._camName = cam.name;
                        m._status = cam.status;

                        m.on('click', function() {
                            openPreview(this);
                        });

                        markers.addLayer(m);
                        allMarkers.push(m);
                    });
                    map.addLayer(markers);

                    // Check visible markers right after loading
                    checkVisibleMarkers();
                });

            // --- Video Preview (same style as admin) ---
            function openPreview(marker) {
                var name = marker._camName || 'Camera';
                var status = marker._status || 'offline';
                var url = marker._streamUrl;

                document.getElementById('preview-name').textContent = name;
                var dot = document.getElementById('preview-status-dot');
                dot.className = 'preview-status ' + status;

                var video = document.getElementById('preview-video');
                var msg = document.getElementById('preview-msg');
                msg.textContent = '';
                video.style.display = 'block';

                // Cleanup previous
                if (previewHls) { previewHls.destroy(); previewHls = null; }
                video.pause();
                video.removeAttribute('src');
                video.load();

                if (!url) {
                    video.style.display = 'none';
                    msg.textContent = 'ไม่มี Stream URL';
                    document.getElementById('preview-modal').classList.add('active');
                    return;
                }

                if (url.includes('.m3u8') && Hls.isSupported()) {
                    previewHls = new Hls({ enableWorker: true, lowLatencyMode: true });
                    previewHls.loadSource(url);
                    previewHls.attachMedia(video);
                    previewHls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(function(){});
                    });
                    previewHls.on(Hls.Events.ERROR, function(ev, data) {
                        if (data.fatal) {
                            video.style.display = 'none';
                            msg.textContent = 'ไม่สามารถโหลดสตรีมได้';
                        }
                    });
                } else if (url.includes('.m3u8') && video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play().catch(function(){});
                } else {
                    video.src = url;
                    video.play().catch(function() {
                        video.style.display = 'none';
                        msg.textContent = 'ไม่สามารถโหลดสตรีมได้';
                    });
                }

                document.getElementById('preview-modal').classList.add('active');
            }

            function closePreview() {
                document.getElementById('preview-modal').classList.remove('active');
                var video = document.getElementById('preview-video');
                if (previewHls) { previewHls.destroy(); previewHls = null; }
                video.pause();
                video.removeAttribute('src');
                video.load();
            }

            // Close preview on overlay click
            document.getElementById('preview-modal').addEventListener('click', function(e) {
                if (e.target === this) closePreview();
            });

            // Close preview on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closePreview();
            });
        </script>
    </body>
</html>
